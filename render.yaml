services:
  # FastAPI Backend
  - type: web
    name: moove-backend
    runtime: python
    region: oregon
    plan: free
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: moove-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "*"
    autoDeploy: true

databases:
  # PostgreSQL Database
  - name: moove-db
    region: oregon
    plan: free
    databaseName: moovedb
    user: mooveuser
